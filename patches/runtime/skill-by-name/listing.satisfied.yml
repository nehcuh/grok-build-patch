id: skill-by-name-listing-header-satisfied
language: Rust
severity: info
message: Skill listing header already requires skill tool by name.
rule:
  pattern: |-
    fn listing_header(tool_name: &str) -> String {
        format!(
            "The following skills are available. When a skill matches the task, \
             use the `{tool_name}` tool with the skill name.\n\n"
        )
    }
