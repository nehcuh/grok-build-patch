id: skill-by-name-default-toolset
language: Rust
severity: error
message: Register OpenCode skill tool in default grok-build toolset.
rule:
  pattern: |-
    fn default_grok_build_toolset() -> ToolServerConfig {
        ToolServerConfig {
            tools: vec![
                $$$TOOLS
                (&grok_build::UpdateGoalTool).into(),
            ],
            behavior_preset: None,
        }
    }
fix: |-
  fn default_grok_build_toolset() -> ToolServerConfig {
      ToolServerConfig {
          tools: vec![
              $$$TOOLS
              (&grok_build::UpdateGoalTool).into(),
              (&opencode::OpenCodeSkillTool).into(),
          ],
          behavior_preset: None,
      }
  }
