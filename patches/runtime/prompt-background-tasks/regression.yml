id: test-background-tasks-defines-callback-and-poll
language: Rust
severity: error
message: Add a regression test pinning the async-callback vs poll semantics in the background_tasks prompt section.
rule:
  pattern:
    context: |-
      #[test]
      fn test_monitor_tool_renders_watch_section() {
          $$$BODY
      }
    selector: function_item
fix: |-
  fn test_monitor_tool_renders_watch_section() {
      $$$BODY
  }

  #[test]
  fn test_background_tasks_defines_callback_and_poll() {
      let tools: HashMap<ToolKind, String> = [
          (ToolKind::Execute, "run_command".to_string()),
          (ToolKind::BackgroundTaskAction, "get_output".to_string()),
          (ToolKind::KillTaskAction, "kill_task".to_string()),
          (ToolKind::Monitor, "monitor".to_string()),
      ]
      .into_iter()
      .collect();
      let r = TemplateRenderer::new(tools, HashMap::new());
      let prompt = render_base(&r, &default_placeholders());
      assert!(
          prompt.contains("**Async callback**"),
          "background_tasks should define the async-callback primitive"
      );
      assert!(
          prompt.contains("**Poll**"),
          "background_tasks should define the poll primitive"
      );
      assert!(
          prompt.contains("print nothing until the terminal state"),
          "async-callback guidance should keep polling silent until completion"
      );
      assert!(
          prompt.contains("never one line per poll tick"),
          "poll guidance should forbid per-tick output"
      );
  }
